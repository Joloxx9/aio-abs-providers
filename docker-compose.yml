version: '3.8'
services:
  aioabs-backbone:
    image: lakafior/aio-abs-providers:latest
    container_name: aio-backbone
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - CONFIG_DIR=/app/config
    volumes:
      - ./config:/app/config
      - ./logs:/logs
    restart: unless-stopped
